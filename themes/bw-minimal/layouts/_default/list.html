{{ define "main" }}
    <div id='blog' class='wrap'>

        <div id='intro'>
            <div class='quote'>
                <p>Just keep writing, anything.</p>
            </div>
        </div>

        <div id='posts' class='section'>
            {{ range .Pages }}
                <div class='post-row'>
                    <p class='post-title'>
                        <a href="{{ .RelPermalink }}">
                            {{ .Title }}
                        </a>
                    </p>
                    <p class='post-date'>
                        {{ .Date.Format "2006-01-02" }}
                    </p>
                </div>
                {{ with .Params.subtitle }}
                <p class='post-subtitle'>
                    {{ . }}
                </p>
                {{ end }}
            {{ end }}
        </div>
    </div>
{{ end }}
